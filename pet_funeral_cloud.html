<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>归尘·宠物殡葬项目 | 每日推进</title>
    <style>
        :root { --primary: #8B5A2B; --bg: #FDFBF7; --text: #2C2C2C; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; font-size: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 80px; resize: vertical; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .btn:disabled { background: #ccc; }
        .success { background: #4CAF50; color: white; padding: 15px; border-radius: 6px; margin-top: 15px; display: none; }
        .config-area { background: #f0f0f0; padding: 15px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; border: 1px solid #ddd; }
        .config-area input { margin-bottom: 10px; font-family: monospace; }
        .hidden { display: none; }
        .loading { text-align: center; color: #666; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🕯️ 归尘·宠物殡葬项目 | 每日推进</h1>
    
    <!-- 配置区 -->
    <div id="configPanel" class="config-area">
        <p style="margin:0 0 10px 0; font-weight:bold; color:#d32f2f;">⚙️ 首次使用配置 (Firebase)</p>
        <p style="font-size:12px; color:#666; margin-bottom:10px;">请输入 Firebase 项目配置信息</p>
        <input type="text" id="apiKey" placeholder="API Key (AIza...)" />
        <input type="text" id="authDomain" placeholder="Auth Domain (xxx.web.app)" style="margin-top:5px;" />
        <input type="text" id="dbUrl" placeholder="Database URL (https://xxx.firebaseio.com)" style="margin-top:5px;" />
        <button class="btn" onclick="saveConfig()" style="margin-top:10px;">保存配置</button>
    </div>

    <!-- 表单区 -->
    <div id="formPanel" class="hidden">
        <div class="form-group">
            <label>日期</label>
            <input type="date" id="dateVal" />
        </div>
        <div class="form-group">
            <label>完成状态</label>
            <select id="statusVal">
                <option value="全部完成">✅ 全部完成</option>
                <option value="部分完成">⚠️ 部分完成</option>
                <option value="未开始">❌ 未开始</option>
            </select>
        </div>
        <div class="form-group">
            <label>关键数据</label>
            <input type="text" id="keyData" placeholder="例如：标注 5 家，拜访 1 家" />
        </div>
        <div class="form-group">
            <label>遇到阻力</label>
            <textarea id="obstacles" placeholder="例如：话术生硬，对方顾虑政策..."></textarea>
        </div>
        <div class="form-group">
            <label>明日计划</label>
            <input type="text" id="plan" placeholder="例如：实地拜访第一家" />
        </div>
        <button class="btn" onclick="submitData()">🚀 提交并生成反馈</button>
        <div id="loading" class="loading">正在提交数据到 Firebase...</div>
    </div>

    <!-- 结果区 -->
    <div id="resultPanel" class="success">
        <p style="margin:0 0 10px 0; font-weight:bold;">✅ 提交成功！数据已存入 Firebase</p>
        <p style="font-size:12px; margin-bottom:5px;">请复制下方内容发送给 AI：</p>
        <textarea id="resultText" style="height:120px; background:#fff; color:#333; border:1px solid #ccc; width:100%;"></textarea>
        <button class="btn" onclick="copyResult()" style="margin-top:10px; background:#fff; color:#4CAF50; border:1px solid #4CAF50;">复制并去发送</button>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    let db;

    window.saveConfig = function() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const authDomain = document.getElementById('authDomain').value.trim();
        const dbUrl = document.getElementById('dbUrl').value.trim();

        if(!apiKey || !authDomain || !dbUrl) { alert('请填写完整配置'); return; }

        const firebaseConfig = {
            apiKey: apiKey,
            authDomain: authDomain,
            databaseURL: dbUrl,
            projectId: authDomain.split('.')[0] || 'pet-funeral'
        };

        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            localStorage.setItem('fb_apiKey', apiKey);
            localStorage.setItem('fb_authDomain', authDomain);
            localStorage.setItem('fb_dbUrl', dbUrl);
            
            document.getElementById('configPanel').classList.add('hidden');
            document.getElementById('formPanel').classList.remove('hidden');
            document.getElementById('dateVal').valueAsDate = new Date();
        } catch (e) {
            alert('初始化失败：' + e.message);
        }
    };

    window.submitData = function() {
        if(!db) { alert('数据库未初始化'); return; }

        const date = document.getElementById('dateVal').value;
        const status = document.getElementById('statusVal').value;
        const keyData = document.getElementById('keyData').value;
        const obstacles = document.getElementById('obstacles').value;
        const plan = document.getElementById('plan').value;

        const md = `【宠物殡葬·每日反馈】\n📅 日期：${date}\n✅ 状态：${status}\n📊 数据：${keyData}\n⚠️ 阻力：${obstacles}\n📅 计划：${plan}`;

        const logData = {
            date: date,
            status: status,
            keyData: keyData,
            obstacles: obstacles,
            plan: plan,
            rawMarkdown: md,
            timestamp: Date.now()
        };

        document.getElementById('loading').style.display = 'block';

        push(ref(db, 'dailyLogs'), logData)
        .then(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('resultText').value = md;
            document.getElementById('resultPanel').style.display = 'block';
            document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
        })
        .catch((error) => {
            document.getElementById('loading').style.display = 'none';
            alert('提交失败：' + error.message);
        });
    };

    window.copyResult = function() {
        const copyText = document.getElementById("resultText");
        copyText.select();
        document.execCommand("copy");
        alert("已复制！请去飞书发送给 AI。");
    };

    // 初始化检查
    window.onload = function() {
        const apiKey = localStorage.getItem('fb_apiKey');
        const authDomain = localStorage.getItem('fb_authDomain');
        const dbUrl = localStorage.getItem('fb_dbUrl');
        if(apiKey && authDomain && dbUrl) {
            document.getElementById('apiKey').value = apiKey;
            document.getElementById('authDomain').value = authDomain;
            document.getElementById('dbUrl').value = dbUrl;
            saveConfig();
        }
    };
</script>
</body>
</html>
